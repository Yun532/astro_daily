sources:
  arxiv:
    days_back: 7
    primary:
      - category: astro-ph.HE
        max_results: 120
    secondary:
      - category: astro-ph.IM
        max_results: 25
      - category: astro-ph.GA
        max_results: 25
      - category: astro-ph.CO
        max_results: 25
      - category: astro-ph.SR
        max_results: 25
      - category: astro-ph.EP
        max_results: 25
  rss:
    max_entries_per_feed: 50
    feeds:
      - name: Nature
        url: https://www.nature.com/nature.rss
      - name: Nature Astronomy
        url: https://www.nature.com/natastron.rss
      - name: Nature Physics
        url: https://www.nature.com/nphys.rss
      - name: Nature Communications
        url: https://www.nature.com/ncomms.rss
      - name: Nature astronomy and astrophysics
        url: https://www.nature.com/subjects/astronomy-and-astrophysics/nature.rss
      - name: Science
        url: https://www.science.org/action/showFeed?type=etoc&feed=rss&jc=science
      - name: Science Advances
        url: https://www.science.org/action/showFeed?type=etoc&feed=rss&jc=sciadv

scoring:
  max_candidates: 120
  max_papers_per_report: 15
  weights:
    novelty: 0.30
    importance: 0.35
    relevance: 0.35
  category_boost:
    astro-ph.HE: 0.10
  same_day_target: 5
  max_backfill_papers: 5
  thresholds:
    astro-ph.HE: 5.8
    non_he: 7.2
  non_he_min_relevance: 6

llm:
  model: claude-opus-4-7
  max_tokens: 32000
  effort: high
  prompt_cache: true

report:
  output_dir: daily_reports
  seen_file: seen_papers.json
  title_prefix: Astro Daily

site_base_url: https://yun532.github.io/astro_daily

publish:
  enabled: true
  provider: github_pages
  mode: git_push
  repo_url: https://github.com/Yun532/astro_daily.git
  branch: main
  docs_dir: docs
  commit_message_template: Publish Astro Daily report {date}
  require_success_before_push: true

wechat:
  enabled: true
  endpoint_template: https://sctapi.ftqq.com/{sendkey}.send

clawbot:
  enabled: true
  base_url: https://ilinkai.weixin.qq.com
  default_recipient: o9cq803A3uKxRbdu5k_QS43jZYt8@im.wechat
  send_report: true
  poll_enabled: false
