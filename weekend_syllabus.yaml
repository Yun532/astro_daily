lessons:
  - id: foundation-01-high-energy-map
    series_id: foundations-high-energy
    series_title_cn: 高能天体物理零基础桥梁课
    part_index: 1
    planned_parts: 4
    title_cn: 高能天体物理零基础课（一）：能量、通量、光变、光谱和时间尺度
    topic: high-energy astrophysics foundations for GRB, TDE, PWN and pulsar halos
    anchor_work_cn: 高能暂现源和非热源论文中反复出现的共同观测语言：flux、luminosity、fluence、spectrum、light curve、distance、timescale。
    prerequisites_cn:
      - 不预设天体物理基础，只要求知道速度、能量、功率和简单函数图像
      - 先把观测量和物理量区分清楚，再进入 GRB、TDE、PWN/pulsar halo
    lesson_scope_cn: 本讲只建立三个方向共用的读论文语言：能量和光度、通量和距离、光变和尺度、光谱和谱指数、数量级估算。不系统讲任何一个具体源类的完整模型。
    previous_context_cn: 这是新人学习路线的第一讲，用来把后续 GRB、TDE、PWN/pulsar halo 课程需要的共同词汇先补齐。
    why_classic_cn: 许多高能天体物理论文的困难不是公式本身，而是读者没有把观测图上的 flux、count rate、spectrum、fluence 和模型中的 luminosity、energy、radius、timescale 对上。本讲先补这层共同地基。
    classic_paper_ids:
      - li-ma-1983-significance
      - hillas-1984-origin-cosmic-rays
    modern_directions_cn:
      - 多信使暂现源的统一时间轴读法
      - 宽能段 SED 和 light curve 联合拟合
      - 从数量级估算判断论文结论是否可信
    search_keywords:
      - high energy astrophysics flux luminosity fluence spectrum light curve
      - astronomical transient light curve spectrum basics
      - Li Ma significance gamma ray astronomy
    links:
      - https://ui.adsabs.harvard.edu/abs/1983ApJ...272..317L/abstract
      - https://ui.adsabs.harvard.edu/abs/1984ARA%26A..22..425H/abstract
  - id: foundation-02-radiation
    series_id: foundations-high-energy
    series_title_cn: 高能天体物理零基础桥梁课
    part_index: 2
    planned_parts: 4
    title_cn: 高能天体物理零基础课（二）：同步辐射、逆康普顿、热辐射和吸收
    topic: radiation mechanisms for high-energy transients and non-thermal nebulae
    anchor_work_cn: 从单个电子辐射、幂律电子分布和磁场/光子场出发，建立 synchrotron、inverse Compton、thermal emission、absorption 的共同图像。
    prerequisites_cn:
      - 已理解通量、光度、光谱和光变的区别
      - 会读 log-log 图上的斜率和谱峰
    lesson_scope_cn: 本讲讲三条主线都会用到的辐射机制：同步辐射、逆康普顿、黑体/光球辐射、冷却和吸收。不讲具体 GRB prompt、TDE disk 或 PWN 动力学细节。
    previous_context_cn: 上一讲建立了观测量语言；本讲把这些观测量和电子、磁场、光子场、温度等物理量连接起来。
    why_classic_cn: GRB afterglow、PWN、pulsar halo 和许多 TDE radio/X-ray 论文都在反复使用同一组辐射机制。先把这组语言学会，后续读模型会轻很多。
    classic_paper_ids:
      - sari-piran-narayan-1998-afterglow
      - kennel-coroniti-1984-crab-pwn
    modern_directions_cn:
      - synchrotron self-Compton 与 Klein-Nishina 修正
      - TeV halo 中电子冷却和 IC 辐射的连接
      - TDE 外流 radio synchrotron 的能量和密度反演
    search_keywords:
      - synchrotron radiation inverse Compton cooling astrophysics
      - nonthermal radiation high energy astrophysics lecture
      - synchrotron self Compton Klein Nishina astrophysics
    links:
      - https://ui.adsabs.harvard.edu/abs/1998ApJ...497L..17S/abstract
      - https://ui.adsabs.harvard.edu/abs/1984ApJ...283..694K/abstract
  - id: foundation-03-reading-paper
    series_id: foundations-high-energy
    series_title_cn: 高能天体物理零基础桥梁课
    part_index: 3
    planned_parts: 4
    title_cn: 高能天体物理零基础课（三）：怎样读一篇高能天体论文
    topic: paper-reading methods for high-energy astrophysics
    anchor_work_cn: 以光变图、能谱图、SED、残差图、corner plot、显著性和系统误差表为核心，训练论文阅读顺序。
    prerequisites_cn:
      - 已理解基础观测量和主要辐射机制
      - 能接受简单似然、误差条和模型残差概念
    lesson_scope_cn: 本讲不讲某个具体源类的新理论，而是训练读论文方法：先看科学问题、样本和图，再看模型、参数、残差、系统误差和结论强度。
    previous_context_cn: 前两讲补了物理词汇；本讲把它们变成读论文动作，下一讲补观测仪器和数据分析常识，再进入 GRB、TDE 和 PWN/pulsar halo 专题。
    why_classic_cn: 新人最容易被摘要和结论带着走。本讲把阅读动作固定下来：先问数据是什么、图支持什么、模型假设是什么、还有哪些退化和反例。
    classic_paper_ids:
      - li-ma-1983-significance
    modern_directions_cn:
      - Bayesian model comparison 和 posterior predictive check
      - 多波段联合拟合中的非同时性和选择效应
      - 从图表判断模型是否过拟合
    search_keywords:
      - astrophysics paper reading light curve spectrum residuals posterior
      - likelihood significance residual diagnostics astronomy
      - Bayesian model comparison astrophysics
    links:
      - https://ui.adsabs.harvard.edu/abs/1983ApJ...272..317L/abstract
  - id: foundation-04-instruments-data
    series_id: foundations-high-energy
    series_title_cn: 高能天体物理零基础桥梁课
    part_index: 4
    planned_parts: 4
    title_cn: 高能天体物理零基础课（四）：望远镜、探测器、响应矩阵和多波段数据
    topic: observational instruments and data analysis foundations for high-energy astrophysics
    anchor_work_cn: 从 Fermi/Swift、Chandra/XMM、VLA/ALMA、HAWC/LHAASO/IACT 到光学巡天，建立 response、exposure、background、PSF、effective area 和 selection effect 的共同读法。
    prerequisites_cn:
      - 已理解光变、光谱、辐射机制和基本论文阅读顺序
      - 不要求实际写数据分析代码，但要能看懂方法和系统误差
    lesson_scope_cn: 本讲讲观测数据怎样从光子/计数变成光变、能谱、图像和显著性：响应矩阵、有效面积、背景、PSF、曝光、触发阈值、多波段非同时性和选择效应。不深入某个软件包的操作教程。
    previous_context_cn: 前三讲建立了读论文的物理和方法语言；本讲补上仪器和数据层，避免后续把模型问题误读成探测器或样本选择问题。
    why_classic_cn: 专业读论文必须知道数据不是直接等于物理量。GRB prompt 谱、TDE X-ray/optical 分类、PWN/halo TeV 形态都强烈依赖仪器响应、背景和选择效应。
    classic_paper_ids:
      - li-ma-1983-significance
      - gaisser-hillas-1977-air-shower
    modern_directions_cn:
      - forward-folding spectral fitting
      - time-domain survey selection effects
      - multi-instrument joint likelihood
      - extended-source morphology systematics
    search_keywords:
      - high energy astrophysics response matrix effective area background PSF
      - forward folding spectral fitting gamma ray astronomy
      - time domain astronomy selection effects multiwavelength
    links:
      - https://ui.adsabs.harvard.edu/abs/1983ApJ...272..317L/abstract
  - id: grb-01-beginner-map
    series_id: grb-beginner-to-frontier
    series_title_cn: GRB 从零到前沿课程
    part_index: 1
    planned_parts: 6
    title_cn: GRB 从零到前沿（一）：什么是伽马暴，为什么它必须相对论
    topic: gamma-ray burst phenomenology, compactness problem, relativistic fireball
    anchor_work_cn: Klebesadel et al. 1973 的 GRB 发现、Goodman 1986 的 compactness problem、Paczynski/Rees-Meszaros 的宇宙学距离和相对论火球图像。
    prerequisites_cn:
      - 已理解光度、通量、光变和谱峰
      - 知道光速给出源区大小上限
    lesson_scope_cn: 本讲从观测事实讲起：短时标、高光度、非热谱和各向同性分布如何迫使我们引入超相对论喷流。不展开内激波、光球和 afterglow 细节。
    previous_context_cn: 前置桥梁课已经讲过共同观测语言；本讲第一次进入 GRB 专题。
    why_classic_cn: GRB 的全部后续模型都绕不开 compactness problem。只有先理解为什么需要大 Lorentz factor，后面讨论 prompt 辐射机制才不会变成参数堆砌。
    classic_paper_ids:
      - klebesadel-1973-grb-discovery
      - goodman-1986-grb-fireball
      - band-1993-grb-spectra
    modern_directions_cn:
      - Fermi/LAT 高能光子对 Lorentz factor 的约束
      - photospheric emission 与磁化喷流
      - GW/GRB 多信使连接
    search_keywords:
      - gamma ray burst compactness problem Lorentz factor
      - Goodman 1986 optically thick gamma ray bursts
      - Fermi LAT GRB Lorentz factor gamma gamma opacity
    links:
      - https://ui.adsabs.harvard.edu/abs/1973ApJ...182L..85K/abstract
      - https://ui.adsabs.harvard.edu/abs/1986ApJ...308L..47G/abstract
  - id: grb-02-prompt-spectrum
    series_id: grb-beginner-to-frontier
    series_title_cn: GRB 从零到前沿课程
    part_index: 2
    planned_parts: 6
    title_cn: GRB 从零到前沿（二）：Band 函数、谱峰和 prompt 光谱到底在拟合什么
    topic: GRB prompt spectral fitting and Band function
    anchor_work_cn: BATSE 时代 Band et al. 1993 的经验谱函数，以及后续 CPL、Band+blackbody、多成分 prompt 谱拟合。
    prerequisites_cn:
      - 已理解 GRB 必须相对论
      - 会读 photon spectrum 和 \(E^2N(E)\) 谱峰
    lesson_scope_cn: 本讲专门讲 prompt 光谱的经验拟合语言：\(\alpha\)、\(\beta\)、\(E_{\rm pk}\)、CPL、Band、黑体成分和残差。不系统讲具体辐射机制的动力学。
    previous_context_cn: 上一讲说明了为什么 GRB 源区必须相对论；本讲转向观测上最常用的 prompt 谱参数。
    why_classic_cn: Band 函数不是最终物理模型，但它是连接数据和物理机制的共同接口。不同 prompt 模型首先都要解释这些经验参数。
    classic_paper_ids:
      - band-1993-grb-spectra
    modern_directions_cn:
      - time-resolved spectroscopy
      - Band+thermal component and spectral width diagnostics
      - machine-learning assisted prompt spectral classification
    search_keywords:
      - Band function gamma ray burst prompt spectrum
      - GRB time resolved spectroscopy Band function cutoff power law
      - GRB prompt spectral width photospheric synchrotron
    links:
      - https://ui.adsabs.harvard.edu/abs/1993ApJ...413..281B/abstract
  - id: grb-03-internal-shock
    series_id: grb-beginner-to-frontier
    series_title_cn: GRB 从零到前沿课程
    part_index: 3
    planned_parts: 6
    title_cn: GRB 从零到前沿（三）：内激波、同步辐射和 line of death
    topic: GRB internal shocks and optically thin synchrotron
    anchor_work_cn: Rees 与 Meszaros 的非稳态壳层内激波图像，以及 BATSE/Fermi 低能谱指数对薄同步辐射的挑战。
    prerequisites_cn:
      - 已理解 Lorentz factor、Band 参数和谱峰
      - 知道同步辐射和电子冷却的基本图像
    lesson_scope_cn: 本讲只讲低磁化壳层碰撞、内激波耗散、薄同步辐射和低能谱斜率张力。不讲光球、磁重联和 afterglow。
    previous_context_cn: 前两讲建立了 GRB prompt 的相对论要求和经验谱接口；本讲开始问能量在喷流内部怎样耗散。
    why_classic_cn: 内激波模型即使不是唯一正确答案，也提供了 prompt 文献中最常用的时间半径关系、耗散效率和冷却谱诊断语言。
    classic_paper_ids:
      - rees-meszaros-1994-internal-shock
      - band-1993-grb-spectra
    modern_directions_cn:
      - decaying magnetic field synchrotron
      - marginally fast cooling
      - multi-zone prompt emission
    search_keywords:
      - GRB internal shock synchrotron line of death
      - Preece synchrotron line of death BATSE
      - marginally fast cooling GRB prompt synchrotron
    links:
      - https://ui.adsabs.harvard.edu/abs/1994ApJ...430L..93R/abstract
  - id: grb-04-photosphere-magnetic
    series_id: grb-beginner-to-frontier
    series_title_cn: GRB 从零到前沿课程
    part_index: 4
    planned_parts: 6
    title_cn: GRB 从零到前沿（四）：光球辐射、亚光球耗散和磁重联模型
    topic: GRB photospheric emission and magnetic reconnection
    anchor_work_cn: GRB prompt 模型从内激波同步辐射走向光球、多成分谱、Poynting-flux dominated jet 和 magnetic reconnection 的理论发展。
    prerequisites_cn:
      - 已理解内激波同步辐射的成功和失败
      - 知道光学厚、热辐射和 Compton 化的基本概念
    lesson_scope_cn: 本讲讲光球半径、热谱展宽、亚光球 Compton 化、磁化喷流和重联耗散如何回应 Band 谱、效率和低能谱指数问题。不重复内激波推导。
    previous_context_cn: 上一讲说明了最简内激波同步辐射的效率和谱斜率张力；本讲讲现代 prompt 模型如何修正这些张力。
    why_classic_cn: 这是从经典 GRB prompt 模型进入前沿争论的关键台阶。现代论文常在同步、光球和磁重联之间比较，必须知道它们分别解决什么问题、制造什么新问题。
    classic_paper_ids:
      - goodman-1986-grb-fireball
      - rees-meszaros-1994-internal-shock
    modern_directions_cn:
      - dissipative photosphere
      - ICMART and reconnection-powered prompt emission
      - prompt polarization and GeV delay as diagnostics
    search_keywords:
      - GRB photospheric emission subphotospheric dissipation Band spectrum
      - GRB magnetic reconnection prompt emission ICMART
      - GRB prompt polarization photosphere synchrotron reconnection
    links:
      - https://ui.adsabs.harvard.edu/abs/1986ApJ...308L..47G/abstract
  - id: grb-05-afterglow
    series_id: grb-beginner-to-frontier
    series_title_cn: GRB 从零到前沿课程
    part_index: 5
    planned_parts: 6
    title_cn: GRB 从零到前沿（五）：afterglow 外激波、Blandford-McKee 和闭合关系
    topic: GRB afterglow external shock and synchrotron closure relations
    anchor_work_cn: Blandford-McKee 相对论 blast wave 与 Sari-Piran-Narayan afterglow 同步辐射标准模型。
    prerequisites_cn:
      - 已理解同步辐射谱段和冷却
      - 知道 GRB prompt 与 afterglow 是不同阶段
    lesson_scope_cn: 本讲讲外激波动力学、减速时间、同步谱断、closure relations 和多波段拟合。不讲 prompt 内耗散机制。
    previous_context_cn: 前四讲主要处理 prompt；本讲转向 ejecta 与外部介质相互作用后的余辉。
    why_classic_cn: afterglow 是 GRB 从爆发识别走向物理参数测量的关键。闭合关系让读者能用光变斜率和谱斜率反推环境、电子分布和喷流结构。
    classic_paper_ids:
      - blandford-mckee-1976
      - sari-piran-narayan-1998-afterglow
    modern_directions_cn:
      - structured jet and off-axis viewing
      - early afterglow GeV emission
      - kilonova/short GRB multi-messenger afterglow
    search_keywords:
      - GRB afterglow Blandford McKee Sari Piran Narayan closure relations
      - structured jet GRB afterglow off axis
      - Fermi LAT early afterglow external shock
    links:
      - https://ui.adsabs.harvard.edu/abs/1976PhFl...19.1130B/abstract
      - https://ui.adsabs.harvard.edu/abs/1998ApJ...497L..17S/abstract
  - id: grb-06-frontier
    series_id: grb-beginner-to-frontier
    series_title_cn: GRB 从零到前沿课程
    part_index: 6
    planned_parts: 7
    title_cn: GRB 从零到前沿（六）：喷流结构、多信使和下一代观测
    topic: GRB structured jets, multimessenger observations and frontier models
    anchor_work_cn: 从 Swift/Fermi 到 GW170817/GRB 170817A，GRB 模型进入结构化喷流、偏轴观测、多信使约束和 population inference 阶段。
    prerequisites_cn:
      - 已理解 prompt、afterglow 和基本喷流动力学
      - 能读多波段光变和简单后验图
    lesson_scope_cn: 本讲整合 GRB 模型前沿：结构化喷流、偏轴视角、short GRB/kilonova、多信使约束和未来探测。不重新推导 Band 函数或 afterglow 基础公式；下一讲专门做论文研读训练。
    previous_context_cn: 前五讲分别讲了 prompt 和 afterglow 的基础模型；本讲把它们合并到现代观测和 population 问题。
    why_classic_cn: 现代 GRB 研究不再只问某个 burst 如何拟合，而是问喷流结构、观测角、中心引擎和多信使事件如何共同限制模型。
    classic_paper_ids:
      - sari-piran-narayan-1998-afterglow
    modern_directions_cn:
      - GW170817-like off-axis short GRB
      - jet angular structure inference
      - prompt-afterglow population synthesis
    search_keywords:
      - structured jet gamma ray burst GW170817 afterglow
      - GRB 170817A off-axis jet afterglow
      - gamma ray burst population synthesis structured jets
    links: []
  - id: grb-07-paper-lab
    series_id: grb-beginner-to-frontier
    series_title_cn: GRB 从零到前沿课程
    part_index: 7
    planned_parts: 7
    title_cn: GRB 从零到前沿（七）：前沿论文研读课，怎样判断 prompt/afterglow 新模型是否可信
    topic: GRB literature lab for prompt emission, afterglow and multimessenger frontier papers
    anchor_work_cn: 以 prompt emission 未解问题、photosphere/synchrotron/reconnection 比较、structured jet afterglow 和 GW170817 后续文献为训练材料。
    prerequisites_cn:
      - 已完成 GRB prompt、afterglow 和前沿模型课程
      - 能读 light curve、spectrum、SED、posterior 和 residual plot
    lesson_scope_cn: 本讲不是再讲一个新模型，而是训练专业读论文：如何拆解一个 GRB 新模型的核心假设、可观测预言、拟合自由度、与旧模型的可区分性和真正的新意。
    previous_context_cn: 前六讲已经建立 GRB 的物理主线；本讲把这些知识转化为阅读和评审最新论文的能力。
    why_classic_cn: 学会 GRB 不是记住所有模型，而是能判断一篇新论文到底解决了 compactness、效率、谱斜率、偏振、GeV 延迟、afterglow 结构中的哪一个问题，还是只是换了参数。
    classic_paper_ids:
      - band-1993-grb-spectra
      - sari-piran-narayan-1998-afterglow
    modern_directions_cn:
      - photospheric prompt emission simulations and spectropolarimetry
      - relativistic turbulence and magnetic reconnection prompt models
      - Bayesian structured-jet inference
      - multimessenger short GRB population studies
    search_keywords:
      - GRB prompt emission unsolved puzzle photosphere synchrotron reconnection review
      - gamma ray burst prompt emission relativistic turbulence magnetic reconnection
      - structured jet Bayesian inference gamma ray burst afterglow
    links:
      - https://ui.adsabs.harvard.edu/abs/1993ApJ...413..281B/abstract
      - https://ui.adsabs.harvard.edu/abs/1998ApJ...497L..17S/abstract
  - id: tde-01-beginner-map
    series_id: tde-beginner-to-frontier
    series_title_cn: TDE 从零到前沿课程
    part_index: 1
    planned_parts: 5
    title_cn: TDE 从零到前沿（一）：恒星怎样被黑洞撕碎
    topic: tidal disruption event basics, tidal radius, event horizon and fallback
    anchor_work_cn: Hills 1975、Rees 1988 和 Phinney 1989 建立的 tidal radius、fallback debris 和 flare 基本图像。
    prerequisites_cn:
      - 已理解能量、光度、时间尺度和黑洞质量数量级
      - 不要求广义相对论基础
    lesson_scope_cn: 本讲从零讲 TDE：潮汐半径、事件视界、最束缚物质返回、fallback 率和 \(t^{-5/3}\) 近似。不讲辐射转移和统一模型细节。
    previous_context_cn: 这是 TDE 系列第一讲，与 GRB 的相对论喷流不同，TDE 的第一性问题是恒星自引力和黑洞潮汐力的竞争。
    why_classic_cn: TDE 入门必须先学会 \(R_{\rm t}\)、\(R_{\rm S}\)、\(\Delta E\)、\(t_{\rm min}\)、\(\dot M_{\rm fb}\) 这条推导链，否则后面的光学/X-ray/radio 差异会失去物理锚点。
    classic_paper_ids:
      - hills-1975-tidal-disruption
      - rees-1988-tde
