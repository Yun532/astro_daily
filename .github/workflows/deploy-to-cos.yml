name: Deploy docs to Tencent COS

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/deploy-to-cos.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install COSCMD
        run: |
          python -m pip install --upgrade pip
          pip install -U coscmd

      - name: Configure COSCMD
        env:
          TENCENT_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: |
          coscmd config \
            -a "$TENCENT_SECRET_ID" \
            -s "$TENCENT_SECRET_KEY" \
            -b "$COS_BUCKET" \
            -r "$COS_REGION"

      - name: Sync docs to COS root
        run: |
          coscmd upload -rs --delete ./docs/ /
