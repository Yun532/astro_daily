- id: blandford-mckee-1976
  title: "Fluid dynamics of relativistic blast waves"
  authors:
    - R. D. Blandford
    - C. F. McKee
  year: 1976
  url: https://ui.adsabs.harvard.edu/abs/1976PhFl...19.1130B/abstract
  topic: Relativistic blast waves
  tags:
    - GRB afterglow
