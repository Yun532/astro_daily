- id: klebesadel-1973-grb-discovery
  title: "Observations of Gamma-Ray Bursts of Cosmic Origin"
  authors:
    - R. W. Klebesadel
    - I. B. Strong
    - R. A. Olson
  year: 1973
  url: https://ui.adsabs.harvard.edu/abs/1973ApJ...182L..85K/abstract
  topic: GRB discovery
  tags:
    - GRB
    - discovery
    - Vela
  why_classic_cn: 这是伽马暴作为天体现象被公开确认的起点。它把短时标、非太阳系、非地球来源的伽马射线爆发现象放进天文学问题框架，是学习 GRB 前必须知道的观测源头。
- id: goodman-1986-grb-fireball
  title: "Are gamma-ray bursts optically thick?"
  authors:
    - Jeremy Goodman
  year: 1986
  url: https://ui.adsabs.harvard.edu/abs/1986ApJ...308L..47G/abstract
  topic: GRB compactness and fireball
  tags:
    - GRB
    - compactness problem
    - fireball
  why_classic_cn: 这篇文章把 GRB 的高光度、短时标和 MeV 光子放在一起，指出静止紧致源会产生严重光学厚问题，并引出相对论火球图像，是理解 bulk Lorentz factor 必要性的基础。
- id: band-1993-grb-spectra
  title: "BATSE observations of gamma-ray burst spectra. I. Spectral diversity"
  authors:
    - David Band
    - James Matteson
    - Louis Ford
    - Bradley Schaefer
    - David Palmer
    - Brian Teegarden
  year: 1993
  url: https://ui.adsabs.harvard.edu/abs/1993ApJ...413..281B/abstract
  topic: GRB prompt emission
  tags:
    - GRB
    - Band function
    - BATSE
    - prompt emission
  why_classic_cn: 这篇文章系统定义并应用了后来被称为 Band function 的伽马暴瞬时辐射经验谱，是理解 GRB prompt emission 谱峰、低能/高能光子指数和辐射机制争论的基础入口。
- id: rees-meszaros-1994-internal-shock
  title: "Unsteady outflow models for cosmological gamma-ray bursts"
  authors:
    - M. J. Rees
    - P. Meszaros
  year: 1994
  url: https://ui.adsabs.harvard.edu/abs/1994ApJ...430L..93R/abstract
  topic: GRB internal shocks
  tags:
    - GRB
    - internal shock
    - relativistic outflow
  why_classic_cn: 这篇文章给出了非稳态相对论壳层碰撞产生内激波的经典图像，把中心引擎变光、碰撞半径、耗散效率和 prompt 光变联系起来。
- id: sari-piran-narayan-1998-afterglow
  title: "Spectra and Light Curves of Gamma-Ray Burst Afterglows"
  authors:
    - Re'em Sari
    - Tsvi Piran
    - Ramesh Narayan
  year: 1998
  url: https://ui.adsabs.harvard.edu/abs/1998ApJ...497L..17S/abstract
  topic: GRB afterglow
  tags:
    - GRB
    - afterglow
    - synchrotron
  why_classic_cn: 这篇文章把外激波余辉的同步辐射谱段、冷却频率、峰值频率和多波段光变标度组织成可读图、可拟合的标准语言，是读 GRB afterglow 论文的核心入口。
- id: blandford-mckee-1976
  title: "Fluid dynamics of relativistic blast waves"
  authors:
    - R. D. Blandford
    - C. F. McKee
  year: 1976
  url: https://ui.adsabs.harvard.edu/abs/1976PhFl...19.1130B/abstract
  topic: Relativistic blast waves
  tags:
    - GRB afterglow
    - blast wave
    - self-similar solution
    - relativistic hydrodynamics
  why_classic_cn: Blandford-McKee 自相似解是相对论激波和 GRB 余辉理论的核心基础，连接能量守恒、Lorentz factor 演化、减速半径和多波段余辉标度关系。
- id: hillas-1984-origin-cosmic-rays
  title: "The Origin of Ultra-High-Energy Cosmic Rays"
  authors:
    - A. M. Hillas
  year: 1984
  url: https://ui.adsabs.harvard.edu/abs/1984ARA%26A..22..425H/abstract
  topic: Cosmic-ray acceleration
  tags:
    - cosmic rays
    - Hillas criterion
    - acceleration
    - ultra-high-energy cosmic rays
  why_classic_cn: Hillas 判据给出了宇宙线加速源尺寸、磁场和最高能量之间的基本约束，是判断 SNR、AGN、GRB、星系团等候选源能否加速超高能宇宙线的经典框架。
- id: li-ma-1983-significance
  title: "Analysis methods for results in gamma-ray astronomy"
  authors:
    - T.-P. Li
    - Y.-Q. Ma
  year: 1983
  url: https://ui.adsabs.harvard.edu/abs/1983ApJ...272..317L/abstract
  topic: Gamma-ray astronomy statistics
  tags:
    - gamma-ray astronomy
    - significance
    - on-off analysis
    - IACT
  why_classic_cn: Li-Ma 显著性公式是伽马射线天文 on/off 计数分析的标准工具，至今仍是 IACT、TeV 源探测和源显著性报告中必须理解的方法基础。
- id: gaisser-hillas-1977-air-shower
  title: "Reliability of the method of constant intensity cuts for reconstructing the average development of vertical showers"
  authors:
    - T. K. Gaisser
    - A. M. Hillas
  year: 1977
  url: https://ui.adsabs.harvard.edu/abs/1977ICRC....8..353G/abstract
  topic: Extensive air showers
  tags:
    - air shower
    - cosmic rays
    - shower maximum
    - composition
  why_classic_cn: Gaisser-Hillas 参数化是描述广延大气簇射纵向发展的经典形式，是宇宙线成分、簇射最大深度和地面/荧光探测器重建方法的重要基础。
- id: hills-1975-tidal-disruption
  title: "Possible power source of Seyfert galaxies and QSOs"
  authors:
    - J. G. Hills
  year: 1975
  url: https://ui.adsabs.harvard.edu/abs/1975Natur.254..295H/abstract
  topic: Tidal disruption events
  tags:
    - TDE
    - black holes
    - tidal radius
  why_classic_cn: Hills 文章提出恒星被大质量黑洞潮汐破坏可以提供强暂现能量来源，是 TDE 思想的早期源头。学习 TDE 时它帮助读者先建立潮汐半径、黑洞质量和恒星自引力之间的基本比较。
- id: rees-1988-tde
  title: "Tidal disruption of stars by black holes of 10^6-10^8 solar masses in nearby galaxies"
  authors:
    - M. J. Rees
  year: 1988
  url: https://ui.adsabs.harvard.edu/abs/1988Natur.333..523R/abstract
  topic: Tidal disruption events
  tags:
    - TDE
    - fallback
    - supermassive black holes
  why_classic_cn: Rees 1988 是现代 TDE 框架的核心经典文献，清楚说明了主序星被超大质量黑洞撕裂后的 debris、fallback 和可观测 flare 图像，是 TDE 入门第一篇应读经典。
- id: phinney-1989-tde-fallback
  title: "Manifestations of a Massive Black Hole in the Galactic Center"
  authors:
    - E. S. Phinney
  year: 1989
  url: https://ui.adsabs.harvard.edu/abs/1989IAUS..136..543P/abstract
  topic: TDE fallback
  tags:
    - TDE
    - fallback rate
    - t^-5/3
  why_classic_cn: 这项工作常被作为 TDE fallback 率近似 \(t^{-5/3}\) 的经典来源之一。它适合放在课程中讲清楚能量分布、最束缚物质返回时间和光变幂律的关系。
- id: evans-kochanek-1989-tde-simulation
  title: "The tidal disruption of a star by a massive black hole"
  authors:
    - C. R. Evans
    - C. S. Kochanek
  year: 1989
  url: https://ui.adsabs.harvard.edu/abs/1989ApJ...346L..13E/abstract
  topic: TDE hydrodynamics
  tags:
    - TDE
    - hydrodynamics
    - numerical simulation
  why_classic_cn: 这是 TDE 数值流体模拟的早期经典工作，展示恒星被撕裂后物质流的形成和返回，为后来讨论 partial disruption、stream self-intersection 和 circularization 奠定了计算图像。
- id: lodato-king-pringle-2009-tde-fallback
  title: "Stellar disruption by a supermassive black hole: is the light curve really proportional to t^-5/3?"
  authors:
    - G. Lodato
    - A. R. King
    - J. E. Pringle
  year: 2009
  url: https://ui.adsabs.harvard.edu/abs/2009MNRAS.392..332L/abstract
  topic: TDE fallback and light curves
  tags:
    - TDE
    - fallback
    - light curve
  why_classic_cn: 这篇文章提醒读者 \(t^{-5/3}\) 不是一切 TDE 光变的自动答案，真实 fallback 取决于恒星结构和破坏深度，是从入门公式走向真实模型的重要桥梁。
- id: guillochon-ramirez-ruiz-2013-tde
  title: "Hydrodynamical simulations to determine the feeding rate of black holes by the tidal disruption of stars"
  authors:
    - James Guillochon
    - Enrico Ramirez-Ruiz
  year: 2013
  url: https://ui.adsabs.harvard.edu/abs/2013ApJ...767...25G/abstract
  topic: TDE simulations
  tags:
    - TDE
    - hydrodynamics
    - partial disruption
  why_classic_cn: 这篇文章系统模拟不同恒星结构和穿越参数下的 TDE fallback，是理解 full/partial disruption、质量返回率和现代 TDE 模型表格化输入的重要文献。
- id: dai-2018-unified-tde
  title: "A Unified Model for Tidal Disruption Events"
  authors:
    - Lixin Dai
    - Jonathan C. McKinney
    - Nathaniel Roth
    - Enrico Ramirez-Ruiz
    - M. Coleman Miller
  year: 2018
  url: https://ui.adsabs.harvard.edu/abs/2018ApJ...859L..20D/abstract
  topic: TDE unified model
  tags:
    - TDE
    - reprocessing
    - viewing angle
    - disk wind
  why_classic_cn: 这篇现代经典把吸积盘、外流/再处理层和观测视角结合起来，解释 optical/UV 与 X-ray TDE 的差异，是从经典 fallback 理论走向最新统一图像的关键入口。
- id: goldreich-julian-1969-pulsar-magnetosphere
  title: "Pulsar Electrodynamics"
  authors:
    - P. Goldreich
    - W. H. Julian
  year: 1969
  url: https://ui.adsabs.harvard.edu/abs/1969ApJ...157..869G/abstract
  topic: Pulsar magnetospheres
  tags:
    - pulsar
    - magnetosphere
    - Goldreich-Julian density
  why_classic_cn: Goldreich-Julian 模型建立了旋转磁化中子星磁层的基本电荷密度和电动力学语言，是理解 pulsar wind、PWN 和 pulsar halo 能量来源的前置经典。
- id: rees-gunn-1974-crab-pwn
  title: "The origin of the magnetic field and relativistic particles in the Crab Nebula"
  authors:
    - M. J. Rees
    - J. E. Gunn
  year: 1974
  url: https://ui.adsabs.harvard.edu/abs/1974MNRAS.167....1R/abstract
  topic: Pulsar wind nebulae
  tags:
    - PWN
    - Crab Nebula
    - pulsar wind
  why_classic_cn: 这篇文章把 Crab Nebula 的非热粒子和磁场与中心脉冲星风联系起来，是 PWN 作为旋转能驱动星云的经典图像来源。
- id: kennel-coroniti-1984-crab-pwn
  title: "Confinement of the Crab pulsar's wind by its supernova remnant"
  authors:
    - C. F. Kennel
    - F. V. Coroniti
  year: 1984
  url: https://ui.adsabs.harvard.edu/abs/1984ApJ...283..694K/abstract
  topic: Pulsar wind nebulae
  tags:
    - PWN
    - Crab Nebula
    - termination shock
    - sigma problem
  why_classic_cn: Kennel-Coroniti 模型是 PWN 课程的核心经典，建立了 pulsar wind termination shock、磁化参数、Crab Nebula 辐射和动力学之间的标准语言。
- id: gaensler-slane-2006-pwn-review
  title: "The Evolution and Structure of Pulsar Wind Nebulae"
  authors:
    - B. M. Gaensler
    - P. O. Slane
  year: 2006
  url: https://ui.adsabs.harvard.edu/abs/2006ARA%26A..44...17G/abstract
  topic: Pulsar wind nebulae
  tags:
    - PWN
    - review
    - evolution
  why_classic_cn: 这篇综述把 PWN 的形态、谱、动力学演化和多波段观测系统组织起来，非常适合作为从 Crab 个例走向 PWN 类群研究的课程阅读材料。
- id: abeysekara-2017-geminga-monogem
  title: "Extended gamma-ray sources around pulsars constrain the origin of the positron flux at Earth"
  authors:
    - A. U. Abeysekara
    - HAWC Collaboration
  year: 2017
  url: https://ui.adsabs.harvard.edu/abs/2017Sci...358..911A/abstract
  topic: Pulsar halos
  tags:
    - pulsar halo
    - Geminga
    - Monogem
    - positron excess
    - HAWC
  why_classic_cn: HAWC 对 Geminga 和 Monogem 周围扩展 TeV 辐射的观测把 pulsar halo 变成独立研究主题，并直接连接近邻脉冲星、电子正电子扩散冷却和 AMS-02 正电子超额问题。
